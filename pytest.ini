[pytest]


minversion = 7.0
filterwarnings =
    ignore::DeprecationWarning:starlette.templating

addopts = 
    -v
    --strict-markers
    --tb=short
    --strict
    -rsxX
    -l
    --cov=app
    --cov-report=term-missing
    --cov-report=html

testpaths = tests


norecursedirs = 
    .*
    venv
    env
    .venv
    .env
    dist
    build
    __pycache__
    *.egg
    .git
    .pytest_cache
    .mypy_cache
    .tox


python_files = test_*.py *_test.py
python_classes = Test* *Test *Suite
python_functions = test_* check_* *_test

markers =
    smoke: Smoke tests - критический функционал
    slow: Медленные тесты
    unit: Unit тесты
    integration: Интеграционные тесты
    api: API тесты
    db: Тесты с БД
    auth: Тесты авторизации
    admin: Тесты админ-доступа
    chat: Тесты чата
    profile: Тесты профиля
    ml: Тесты ML сервиса
    rate_limit: Тесты rate limiting
    jwt: Тесты JWT


log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S


junit_suite_name = Dating Site API Tests
junit_logging = all

xfail_strict = true


filterwarnings =
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:jose.*
    ignore::DeprecationWarning:starlette.*
    ignore::DeprecationWarning:pytest_asyncio.*
    ignore::sklearn.exceptions.InconsistentVersionWarning
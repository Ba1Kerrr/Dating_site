{% extends "base.html" %}

{% block content %}
<h2 style="font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px;">Новое сообщение 💬</h2>
<p style="font-size: 16px; line-height: 1.5; color: #4a5568; margin-bottom: 16px;">
    Привет, <strong>{{ username }}</strong>!<br><br>
    <strong>{{ sender }}</strong> написал(а):
</p>
<div style="background-color: #f0f2f5; border-radius: 12px; padding: 16px; margin-bottom: 24px;">
    <p style="margin: 0; font-size: 15px; color: #1a1a2e; font-style: italic;">"{{ message_preview }}"</p>
</div>
<table cellpadding="0" cellspacing="0" border="0" style="margin: 24px auto;">
    <tr>
        <td align="center" style="background: linear-gradient(135deg, #0066FF, #00CC99); border-radius: 48px; padding: 12px 32px;">
            <a href="{{ link }}" style="display: inline-block; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600;">Ответить</a>
        </td>
    </tr>
</table>
{% endblock %}

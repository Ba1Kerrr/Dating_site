{% extends "base.html" %}

{% block content %}
<h2 style="font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px;">Сброс пароля</h2>
<p style="font-size: 16px; line-height: 1.5; color: #4a5568; margin-bottom: 24px;">
    Привет, <strong>{{ username }}</strong>!<br><br>
    Мы получили запрос на сброс пароля. Если это был ты, нажми на кнопку:
</p>
<table cellpadding="0" cellspacing="0" border="0" style="margin: 24px auto;">
    <tr>
        <td align="center" style="background: linear-gradient(135deg, #0066FF, #00CC99); border-radius: 48px; padding: 12px 32px;">
            <a href="{{ link }}" style="display: inline-block; color: #ffffff; text-decoration: none; font-size: 16px; font-weight: 600;">Сбросить пароль</a>
        </td>
    </tr>
</table>
<p style="font-size: 14px; color: #718096; margin-top: 16px;">
    Если ты не запрашивал сброс — проигнорируй письмо.<br>
    Ссылка действительна 1 час: <a href="{{ link }}" style="color: #0066FF;">{{ link }}</a>
</p>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f5f5f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table width="100%" max-width="600px" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 32px 24px 0 24px;">
                            <div style="background: linear-gradient(135deg, #0066FF, #00CC99); width: 60px; height: 60px; border-radius: 30px; display: inline-block; text-align: center; line-height: 60px; font-size: 28px; font-weight: bold; color: white;">{{ icon }}</div>
                            <h1 style="margin: 20px 0 0 0; font-size: 28px; font-weight: 700; color: #1a1a2e;">Dating Site</h1>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td align="center" style="padding: 24px;">
                            {{ content }}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 24px; border-top: 1px solid #e2e8f0;">
                            <p style="font-size: 12px; color: #a0aec0; margin: 0;">Dating Site — знакомства с умом</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>

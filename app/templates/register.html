<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulMates — Регистрация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}">
</head>
<body>
<body>
<nav>
  <a class="nav-logo" href="/">SOULMATES</a>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/login">Войти</a>
  </div>
</nav>

<div class="page">
  <div class="card">
    <div class="card-logo">Регистрация</div>
    <div class="card-subtitle">Создайте аккаунт и найдите своего человека</div>

    <form method="post" action="/register" id="register_form">
      <div class="form-group">
        <label class="form-label">Имя пользователя</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="email-row">
          <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          <button type="button" class="send-btn" id="send_email_button">Код →</button>
        </div>
        <div id="code-status"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Код подтверждения</label>
        <input class="form-input" type="text" id="input_key" name="input_key" placeholder="Введите код из письма" required>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label">Подтверждение пароля</label>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password">
      </div>

      <button type="submit" class="submit-btn">Создать аккаунт</button>
    </form>

    <div class="login-link">Уже есть аккаунт? <a href="/login">Войти</a></div>
  </div>
</div>

<script>
document.getElementById("send_email_button").addEventListener("click", function() {
  var email = document.getElementById('email').value;
  var statusEl = document.getElementById('code-status');
  if (!email) { statusEl.style.display = 'block'; statusEl.style.color = '#f87171'; statusEl.textContent = 'Введите email'; return; }
  statusEl.style.display = 'block'; statusEl.style.color = '#c084fc'; statusEl.textContent = 'Отправляем код...';
  fetch("/register/send_email", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: email })
  })
  .then(function(r) { return r.json(); })
  .then(function() { statusEl.style.color = '#34d399'; statusEl.textContent = '✓ Код отправлен на ' + email; })
  .catch(function() { statusEl.style.color = '#f87171'; statusEl.textContent = 'Ошибка. Попробуйте снова.'; });
});
</script>
    
    
  <script src="{{ url_for('static', path='static/js/utils.js') }}"></script>
  <script src="{{ url_for('static', path='static/js/register.js') }}"></script>
</body>
</html>

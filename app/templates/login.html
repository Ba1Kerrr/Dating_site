<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulMates — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}">
</head>
<body>
<body>
<nav>
  <a class="nav-logo" href="/">SOULMATES</a>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/register">Регистрация</a>
  </div>
</nav>

<div class="page">
  <div class="card">
    <div class="card-logo">С возвращением</div>
    <div class="card-subtitle">Войдите в свой аккаунт SoulMates</div>

    <form action="/login" method="post" id="login-form">
      <div class="form-group">
        <label class="form-label">Имя пользователя</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="toggle-pw" id="togglePassword" onclick="togglePw()">👁</button>
        </div>
      </div>

      <button type="submit" class="submit-btn">Войти</button>
    </form>

    <a href="/forgot_password" class="forgot-link">Забыли пароль?</a>

    <div class="register-link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
  </div>
</div>

<div id="toast-container"></div>
<script>
function togglePw() {
  var pw = document.getElementById('password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
}
</script>
    
    
  <script src="{{ url_for('static', path='static/js/utils.js') }}"></script>
  <script src="{{ url_for('static', path='static/js/login_auth.js') }}"></script>
</body>
</html>

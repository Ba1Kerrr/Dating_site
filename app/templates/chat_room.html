<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с {{ companion }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fff;
            padding: 14px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header a { color: #666; text-decoration: none; font-size: 20px; }
        .header h2 { font-size: 16px; font-weight: 600; }
        .status { font-size: 12px; color: #aaa; margin-left: auto; }
        .status.online { color: #4caf50; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg.mine {
            background: #0084ff;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.theirs {
            background: #fff;
            color: #1c1c1c;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .msg .time {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.6;
            text-align: right;
        }

        .msg.theirs .time { text-align: left; }

        .msg.status-msg {
            background: none;
            color: #aaa;
            font-size: 12px;
            align-self: center;
            padding: 4px 0;
        }

        .input-area {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.4;
        }

        .input-area textarea:focus { border-color: #0084ff; }

        .send-btn {
            background: #0084ff;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .send-btn:hover { background: #0073e6; }
        .send-btn:disabled { background: #ccc; cursor: default; }

        .load-more {
            text-align: center;
            padding: 8px;
        }

        .load-more button {
            background: none;
            border: none;
            color: #0084ff;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="/chat">←</a>
    <h2>{{ companion }}</h2>
    <span class="status" id="conn-status">соединение...</span>
</div>

<div class="messages" id="messages">
    <div class="load-more" id="load-more-btn">
        <button onclick="loadMore()">загрузить старые сообщения</button>
    </div>

    {% for msg in messages %}
    <div class="msg {% if msg.sender == user %}mine{% else %}theirs{% endif %}">
        {{ msg.text }}
        <div class="time">
            {% if msg.created_at %}{{ msg.created_at.strftime('%H:%M') }}{% endif %}
        </div>
    </div>
    {% endfor %}
</div>

<div class="input-area">
    <textarea id="msg-input" placeholder="Напиши сообщение..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
</div>

{# Передаём данные в JS через data-атрибуты — без конфликтов с Jinja2 #}
<div id="js-data"
     data-user="{{ user }}"
     data-companion="{{ companion }}"
     data-offset="{{ messages|length }}"
     style="display:none"></div>

<script>
    const jsData      = document.getElementById("js-data").dataset;
    const currentUser = jsData.user;
    const companion   = jsData.companion;
    let   offset      = parseInt(jsData.offset, 10);

    const messagesEl  = document.getElementById("messages");
    const input       = document.getElementById("msg-input");
    const sendBtn     = document.getElementById("send-btn");
    const statusEl    = document.getElementById("conn-status");

    let ws;

    function connect() {
        ws = new WebSocket("ws://" + location.host + "/chat/ws/" + companion + "?username=" + currentUser);

        ws.onopen = function() {
            statusEl.textContent = "онлайн";
            statusEl.className = "status online";
            sendBtn.disabled = false;
        };

        ws.onclose = function() {
            statusEl.textContent = "нет соединения";
            statusEl.className = "status";
            sendBtn.disabled = true;
            setTimeout(connect, 3000);
        };

        ws.onerror = function() {
            statusEl.textContent = "ошибка";
            statusEl.className = "status";
        };

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === "status") {
                appendStatus(data.text);
                return;
            }
            if (data.error) {
                appendStatus("⚠ " + data.error);
                return;
            }

            appendMessage(data.sender, data.text, new Date());
            offset++;
        };
    }

    function appendMessage(sender, text, date) {
        const div = document.createElement("div");
        div.className = "msg " + (sender === currentUser ? "mine" : "theirs");

        const timeStr = date.toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit" });
        div.innerHTML = escapeHtml(text) + '<div class="time">' + timeStr + "</div>";

        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendStatus(text) {
        const div = document.createElement("div");
        div.className = "msg status-msg";
        div.textContent = text;
        messagesEl.appendChild(div);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ text: text }));
        input.value = "";
        input.style.height = "auto";
    }

    function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    async function loadMore() {
        const resp = await fetch("/chat/" + companion + "/history?limit=30&offset=" + offset);
        const data = await resp.json();

        if (!data.messages.length) {
            document.getElementById("load-more-btn").style.display = "none";
            return;
        }

        const firstChild = messagesEl.children[1];
        data.messages.forEach(function(msg) {
            const div = document.createElement("div");
            div.className = "msg " + (msg.sender === currentUser ? "mine" : "theirs");
            const d = new Date(msg.created_at);
            const timeStr = d.toLocaleTimeString("ru", { hour: "2-digit", minute: "2-digit" });
            div.innerHTML = escapeHtml(msg.text) + '<div class="time">' + timeStr + "</div>";
            messagesEl.insertBefore(div, firstChild);
        });

        offset += data.messages.length;
    }

    function escapeHtml(text) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(text));
        return d.innerHTML;
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
    connect();
</script>
</body>
</html>

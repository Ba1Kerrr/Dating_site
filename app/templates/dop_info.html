<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulMates — Заполните профиль</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}">
</head>
<body>
<body>
<nav>
  <a class="nav-logo" href="/">SOULMATES</a>
</nav>

<div class="page">
  <div class="card">
    <div class="step-badge">Шаг 2 из 2</div>
    <div class="card-logo">Привет, <span class="greeting">{{ user }}</span>!</div>
    <div class="card-subtitle">Расскажите немного о себе — это поможет найти лучших кандидатов</div>

    <form method="post" action="/register/dop-info" enctype="multipart/form-data" id="form">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Имя</label>
          <input class="form-input" type="text" name="name" placeholder="Ваше имя">
        </div>
        <div class="form-group">
          <label class="form-label">Возраст</label>
          <input class="form-input" type="number" name="age" placeholder="22" min="18" max="99">
        </div>

        <div class="form-group">
          <label class="form-label">Пол</label>
          <select class="form-select" name="gender">
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Город</label>
          <input class="form-input" type="text" name="location" id="city" placeholder="Москва">
        </div>

        <div class="form-group full">
          <label class="form-label">О себе</label>
          <input class="form-input" type="text" name="bio" placeholder="Пара слов о вас...">
        </div>

        <div class="divider"></div>

        <div class="form-group full">
          <label class="form-label">Фото профиля</label>
          <div class="avatar-upload" id="drop-zone">
            <input type="file" name="file" accept="image/*" onchange="previewFile(this)">
            <img id="preview-img" class="avatar-preview" src="" alt="Preview">
            <div id="upload-placeholder">
              <div class="upload-icon">📷</div>
              <div class="upload-text">Нажмите или перетащите фото<br><span>JPG, PNG до 5 МБ</span></div>
            </div>
          </div>
        </div>

        <button type="submit" class="submit-btn">Завершить регистрацию →</button>
      </div>
    </form>
  </div>
</div>

<script>
function previewFile(input) {
  var file = input.files[0];
  if (!file) return;
  if (!file.type.match('image.*')) { alert('Только изображения!'); input.value = ''; return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.classList.add('visible');
    document.getElementById('upload-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
</script>
    
    
  <script src="{{ url_for('static', path='static/js/utils.js') }}"></script>
  <script src="{{ url_for('static', path='static/js/dop_info.js') }}"></script>
</body>
</html>

services:
  db:
    image: postgres:16
    container_name: dating-postgres
    restart: unless-stopped
    env_file:
      - app/settings/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dating_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dating-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dating_network

  redis:
    image: redis:7-alpine
    container_name: dating-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dating_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating-celery
    restart: unless-stopped
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=4 -Q emails,default
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - app/settings/.env
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app
    working_dir: /app
    networks:
      - dating_network

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating-flower
    restart: unless-stopped
    command: celery -A celery_app.celery_app flower --port=5555
    depends_on:
      - celery_worker
      - rabbitmq
    env_file:
      - app/settings/.env
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"  # Flower UI → http://localhost:5555
    volumes:
      - ./app:/app
    working_dir: /app
    networks:
      - dating_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - app/settings/.env
    volumes:
      - ./app:/app
    environment:
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    networks:
      - dating_network

  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: dating-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - app/settings/.env
    volumes:
      - ./app/ml/models:/app/ml/models
      - ./app/ml:/app/ml
    environment:
      - ENVIRONMENT=development
    networks:
      - dating_network

  frontend:
    build: ./frontend
    container_name: dating-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:8000
    networks:
      - dating_network

volumes:
  postgres_data:

networks:
  dating_network:
    driver: bridge
services:
  db:
    image: postgres:16
    container_name: dating-postgres
    restart: unless-stopped
    env_file:
      - app/settings/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dating-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - app/settings/.env
    volumes:
      - ./app:/app
    environment:
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
      
  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: dating-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - app/settings/.env
    volumes:
      - ./app/ml/models:/app/ml/models
      - ./app/ml:/app/ml
      - ./app/ml_service.py:/app/ml_service.py
    environment:
      - ENVIRONMENT=development

volumes:
  postgres_data:
